<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesión cerrada | HotelERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background: url('https://images.pexels.com/photos/261169/pexels-photo-261169.jpeg?auto=compress&cs=tinysrgb&w=1600') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: 1;
        }
        .logout-card {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            padding: 2rem;
            text-align: center;
            max-width: 450px;
            width: 90%;
        }
        .logout-card i {
            font-size: 4rem;
            color: #28a745;
            background: #e9f7ef;
            padding: 20px;
            border-radius: 50%;
            margin-bottom: 1rem;
        }
        .btn-login {
            border-radius: 2rem;
            padding: 0.6rem 1.8rem;
            font-weight: 500;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="logout-card">
        <i class="fas fa-check-circle"></i>
        <h2 class="mt-3">¡Sesión cerrada!</h2>
        <p class="text-muted">Has cerrado sesión correctamente. Gracias por usar HotelERP.</p>
        <a href="{% url 'admin:login' %}" class="btn btn-primary btn-login">Volver a iniciar sesión</a>
        <div class="mt-4 small text-muted">
            <i class="fas fa-laptop"></i> ¿Olvidaste tu contraseña? Contacta al administrador.
        </div>
    </div>
</body>
</html>

{% extends 'hotel/base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="fas fa-tag"></i> Tipos de Habitación</h2>
    <a href="{% url 'hotel:roomtype_create' %}" class="btn btn-primary"><i class="fas fa-plus"></i> Nuevo Tipo</a>
</div>
<div class="card shadow-sm">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Precio por noche</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for rt in roomtypes %}
                    <tr>
                        <td>{{ rt.name }}</td>
                        <td>{{ rt.description|truncatechars:50 }}</td>
                        <td>${{ rt.price_per_night }}</td>
                        <td>
                            <a href="{% url 'hotel:roomtype_edit' rt.pk %}" class="btn btn-sm btn-outline-primary"><i class="fas fa-edit"></i></a>
                            <a href="{% url 'hotel:roomtype_delete' rt.pk %}" class="btn btn-sm btn-outline-danger"><i class="fas fa-trash"></i></a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr><td colspan="4" class="text-center">No hay tipos registrados.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

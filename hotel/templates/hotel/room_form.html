{% extends 'hotel/base.html' %}
{% block content %}
<div class="container">
    <div class="card shadow-sm">
        <div class="card-header bg-white">
            <h3 class="mb-0"><i class="fas fa-bed"></i> {{ title }}</h3>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a href="{% url 'hotel:room_list' %}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
